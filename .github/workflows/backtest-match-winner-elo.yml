name: Backtest Match Winner ELO

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backtest-match-winner-elo:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run walk-forward ELO backtest
        env:
          MATCH_WINNER_ELO_TEST_START: "2026-03-01"
          MATCH_WINNER_ELO_MIN_PLAYER_MATCHES: "10"
          MATCH_WINNER_ELO_BLEND_OVERALL_WEIGHT: "0.60"
          MATCH_WINNER_ELO_BLEND_SURFACE_WEIGHT: "0.40"
        run: python -m tennis_elo.backtest_match_winner_elo

      - name: Validate backtest
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path(
              "data/backtests/match_winner_elo_backtest.json"
          )

          if not path.exists():
              raise SystemExit(
                  "Missing match-winner ELO backtest output"
              )

          data = json.loads(
              path.read_text(encoding="utf-8")
          )

          counts = data.get("counts", {})

          if not counts.get("test_predictions"):
              raise SystemExit(
                  "Backtest produced zero predictions"
              )

          print("COUNTS:", counts)
          print("BEST MODEL:", data.get("best_model"))
          print(
              "MODEL RANKING:",
              data.get("model_ranking"),
          )

          for model, summary in data.get(
              "summary",
              {},
          ).items():
              print(model.upper() + ":", summary)

          print(
              "BY SURFACE:",
              data.get("by_surface", {}),
          )
          PY

      - name: Commit backtest outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/backtests/match_winner_elo_backtest.json
          git add data/reports/match_winner_elo_backtest_report.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Backtest match winner ELO models"
          git pull --rebase --autostash origin main
          git push origin HEAD:main
