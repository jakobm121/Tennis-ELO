name: Audit Tournament Codes

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit-tournament-codes:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run tournament code audit
        run: |
          python -m tennis_elo.audit_tournament_codes

      - name: Validate audit output
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path(
              "data/reports/tournament_code_audit.json"
          )

          if not path.exists():
              raise SystemExit(
                  "Missing tournament code audit output"
              )

          data = json.loads(
              path.read_text(encoding="utf-8")
          )

          print(
              "SUMMARY:",
              data.get("summary", {}),
          )

          print("\nTOP 30 TOURNAMENT CODES:")

          for row in data.get("codes", [])[:30]:
              print({
                  "tournament_code": row.get(
                      "tournament_code"
                  ),
                  "matches": row.get("matches"),
                  "first_year": row.get(
                      "first_year"
                  ),
                  "last_year": row.get(
                      "last_year"
                  ),
                  "surfaces": row.get(
                      "surfaces"
                  ),
                  "top_players": [
                      item.get("player")
                      for item in row.get(
                          "top_players",
                          [],
                      )[:5]
                  ],
              })
          PY

      - name: Commit audit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/reports/tournament_code_audit.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Audit tournament codes"
          git pull --rebase --autostash origin main
          git push origin HEAD:main
