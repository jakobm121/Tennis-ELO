name: Tennis Machine

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  run-tennis-machine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium

      - name: Run tennis machine pipeline
        run: python -m tennis_machine.run_pipeline

      - name: Enrich match URLs
        run: python -m tennis_machine.enrich_match_urls

      - name: Run match watchlist
        run: python -m tennis_machine.decisions.match_watchlist

      - name: Run Flashscore odds parser
        run: python -m tennis_machine.odds.flashscore_odds_parser

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add tennis_machine/data/processed || true
          git add tennis_machine/data/warehouse || true
          git add tennis_machine/data/signals || true
          git add tennis_machine/data/decisions || true
          git add tennis_machine/data/odds || true
          git add tennis_machine/reports || true
          git add tennis_machine/data/reports || true
          git add tennis_machine/config || true

          git commit -m "Update tennis machine data" || echo "No changes to commit"
          git push
