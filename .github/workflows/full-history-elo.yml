name: Full History ELO Pipeline

on:
  workflow_dispatch:
  schedule:
  - cron: "0 */3 * * *"

permissions:
  contents: write

jobs:
  full-history-elo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium

      - name: Parse daily matches
        env:
          MAX_DAILY_MATCHES: "10"
          SKIP_SEEN_MATCHES: "1"
        run: python -m tennis_elo.sources.rezultati_daily_matches

      - name: Generate history URLs
        run: python -m tennis_elo.sources.generate_history_urls

      - name: Parse player history
        run: python -m tennis_elo.sources.flashscore_history_parser

      - name: Merge history archive
        run: python -m tennis_elo.sources.merge_history_archive

      - name: Build ELO pipeline
        run: python -m tennis_elo.run_pipeline

      - name: Commit outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add config/flashscore_urls.txt || true
          git add data || true
          git add tennis_elo || true

          git commit -m "Update full history ELO pipeline" || echo "No changes to commit"
          git push
