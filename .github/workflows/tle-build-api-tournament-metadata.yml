name: TLE Build API Tournament Metadata

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-metadata:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build API tournament metadata
        run: |
          python -m tennis_elo.tle_build_api_tournament_metadata

      - name: Show summary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path(
              "data/tle/mappings/api_tournament_metadata.json"
          )

          payload = json.loads(
              path.read_text(encoding="utf-8")
          )

          print(json.dumps(
              payload["summary"],
              indent=2,
              ensure_ascii=False,
          ))
          PY

      - name: Commit generated metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            data/tle/mappings/api_tournament_metadata.json \
            data/tle/reports/tle_build_api_tournament_metadata_report.json

          if git diff --cached --quiet; then
            echo "No metadata changes to commit."
            exit 0
          fi

          git commit -m "Build TLE API tournament metadata"
          git push
