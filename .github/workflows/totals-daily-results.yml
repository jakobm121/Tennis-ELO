name: Totals Daily Results

on:
  workflow_dispatch:
  schedule:
    - cron: "45 */3 * * *"

permissions:
  contents: write

jobs:
  totals-daily-results:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium

      - name: Parse daily finished results
        env:
          MAX_DAILY_RESULT_ROWS: "250"
          CLICK_FINISHED_TAB: "1"
          DAILY_RESULTS_WAIT_MS: "8000"
        run: python -m tennis_elo.sources.rezultati_daily_results

      - name: Commit totals outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/totals/daily_scorelines.json || true
          git add data/totals/scorelines_archive.json || true

          git add data/reports/rezultati_daily_results_report.json || true
          git add data/reports/debug_rezultati_daily_results_text.txt || true

          git commit -m "Update totals daily results" || echo "No changes to commit"
          git push
