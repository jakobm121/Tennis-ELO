name: Backtest ELO on AI Tennis Results

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backtest-elo-on-ai-results:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ELO backtest on AI results
        env:
          AI_TENNIS_RESULTS_URL: "https://raw.githubusercontent.com/jakobm121/Ai/refs/heads/main/data/tennis_results.json"
          ELO_AI_RESULTS_MIN_PLAYER_MATCHES: "10"
          ELO_AI_RESULTS_OVERALL_WEIGHT: "0.60"
          ELO_AI_RESULTS_SURFACE_WEIGHT: "0.40"
          ELO_AI_RESULTS_SURFACE_CONFIDENCE_MATCHES: "20"
          ELO_AI_RESULTS_EV_THRESHOLDS: "0.00,0.03,0.05,0.08,0.10,0.15"
          ELO_AI_RESULTS_MIN_MODEL_PROBABILITIES: "0.50,0.55,0.60"
          ELO_AI_RESULTS_MIN_ODDS_VALUES: "1.00,1.50,1.75,2.00"
        run: python -m tennis_elo.backtest_elo_on_ai_results

      - name: Validate backtest
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path(
              "data/backtests/elo_on_ai_results_backtest.json"
          )

          if not path.exists():
              raise SystemExit(
                  "Missing ELO-on-AI-results backtest output"
              )

          data = json.loads(
              path.read_text(encoding="utf-8")
          )

          print("COUNTS:", data.get("counts", {}))
          print(
              "ALL RESULTS:",
              data.get("all_ai_results_summary", {}),
          )

          print("\nBEST THRESHOLDS:")

          for row in data.get("best_thresholds", [])[:20]:
              print(row)

          print(
              "\nBY GENDER:",
              data.get("by_gender", {}),
          )
          print(
              "BY TOUR LEVEL:",
              data.get("by_tour_level", {}),
          )
          print(
              "BY SURFACE:",
              data.get("by_surface", {}),
          )
          PY

      - name: Commit backtest outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/backtests/elo_on_ai_results_backtest.json
          git add data/reports/elo_on_ai_results_backtest_report.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Backtest ELO on AI tennis results"
          git pull --rebase --autostash origin main
          git push origin HEAD:main
