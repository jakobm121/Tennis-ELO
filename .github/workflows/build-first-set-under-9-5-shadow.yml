name: Build First Set Under 9.5 Shadow Picks

on:
  workflow_dispatch:
  schedule:
    - cron: "35 */3 * * *"

permissions:
  contents: write

concurrency:
  group: first-set-under-9-5-shadow
  cancel-in-progress: true

jobs:
  build-first-set-under-9-5-shadow:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build shadow picks
        env:
          TENNIS_ODDS_URL: "https://raw.githubusercontent.com/jakobm121/Ai/refs/heads/main/data/tennis_odds_today.json"
          FIRST_SET_SHADOW_MIN_FAVORITE_PROBABILITY: "0.75"
          FIRST_SET_SHADOW_HIGH_FAVORITE_PROBABILITY: "0.85"
          FIRST_SET_SHADOW_MIN_UNDER_ODDS: "1.80"
          FIRST_SET_SHADOW_MIN_PLAYER_SAMPLE: "10"
          FIRST_SET_SHADOW_MIN_ONE_PLAYER_SAMPLE: "2"
          FIRST_SET_SHADOW_MIN_MODEL_UNDER_PROBABILITY: "0.56"
          FIRST_SET_SHADOW_MIN_EDGE: "0.05"
        run: python -m tennis_elo.totals.build_first_set_under_9_5_shadow

      - name: Validate shadow picks
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path(
              "data/predictions/first_set_under_9_5_shadow.json"
          )

          if not path.exists():
              raise SystemExit("Missing shadow-picks output")

          data = json.loads(path.read_text(encoding="utf-8"))

          print("SUMMARY:", data.get("summary", {}))

          for pick in data.get("shadow_picks", [])[:20]:
              print(
                  "PICK:",
                  pick.get("match"),
                  "favorite_prob=",
                  pick.get("favorite_probability"),
                  "under_odds=",
                  pick.get("under_odds"),
                  "model_prob=",
                  pick.get("model_under_probability"),
                  "edge=",
                  pick.get("edge"),
                  "confidence=",
                  pick.get("confidence"),
              )
          PY

      - name: Show no-bet reasons
        run: |
          python - <<'PY'
          import json
          from collections import Counter
          from pathlib import Path

          path = Path(
              "data/predictions/first_set_under_9_5_shadow.json"
          )

          data = json.loads(path.read_text(encoding="utf-8"))
          rows = data.get("all_evaluated", [])

          reasons = Counter()

          for row in rows:
              for reason in row.get("reasons", []):
                  reasons[reason] += 1

          print("NO-BET REASONS:")

          for reason, count in reasons.most_common():
              print(reason, count)

          print("\nTOP 10 CLOSEST MATCHES:")

          ranked = sorted(
              rows,
              key=lambda row: (
                  row.get("favorite_probability") or 0,
                  row.get("under_odds") or 0,
                  row.get("edge") or -999,
              ),
              reverse=True,
          )

          for row in ranked[:10]:
              print({
                  "match": row.get("match"),
                  "favorite_probability": row.get(
                      "favorite_probability"
                  ),
                  "under_odds": row.get("under_odds"),
                  "model_probability": row.get(
                      "model_under_probability"
                  ),
                  "fair_odds": row.get("fair_odds_under"),
                  "edge": row.get("edge"),
                  "decision": row.get("decision"),
                  "reasons": row.get("reasons"),
                  "profiles": row.get("profile_matches"),
              })
          PY

      - name: Commit shadow-picks outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/predictions/first_set_under_9_5_shadow.json
          git add data/reports/first_set_under_9_5_shadow_report.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update first set under 9.5 shadow picks"
          git pull --rebase --autostash origin main
          git push origin HEAD:main
