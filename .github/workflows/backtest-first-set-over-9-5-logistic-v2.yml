name: Backtest First Set Over 9.5 Logistic V2

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backtest-first-set-over-9-5-logistic-v2:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install scikit-learn

      - name: Run logistic V2 walk-forward backtest
        env:
          FIRST_SET_LOGIT_V2_TEST_START: "2026-03-01"
          FIRST_SET_LOGIT_V2_MIN_PLAYER_SAMPLE: "10"
          FIRST_SET_LOGIT_V2_MIN_TRAIN_ROWS: "300"
          FIRST_SET_LOGIT_V2_RECENT_WINDOW: "10"
          FIRST_SET_LOGIT_V2_REFIT_FREQUENCY: "monthly"
        run: python -m tennis_elo.totals.backtest_first_set_over_9_5_logistic_v2

      - name: Validate backtest
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path(
              "data/backtests/first_set_over_9_5_logistic_v2_backtest.json"
          )

          if not path.exists():
              raise SystemExit("Missing logistic V2 backtest output")

          data = json.loads(path.read_text(encoding="utf-8"))
          summary = data.get("summary", {})

          if not summary.get("test_matches"):
              raise SystemExit("Logistic V2 backtest produced zero test matches")

          print("SUMMARY:", summary)
          print("BY SURFACE:", data.get("by_surface", {}))
          print("BY GENDER:", data.get("by_gender", {}))
          print("BY MATCH BALANCE:", data.get("by_match_balance", {}))
          print("CALIBRATION:", data.get("calibration", []))
          print("COUNTERS:", data.get("counters", {}))
          PY

      - name: Commit backtest outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/backtests/first_set_over_9_5_logistic_v2_backtest.json
          git add data/reports/first_set_over_9_5_logistic_v2_backtest_report.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Backtest logistic V2 first set over 9.5 model"
          git pull --rebase --autostash origin main
          git push origin HEAD:main
