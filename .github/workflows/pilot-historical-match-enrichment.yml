name: Pilot Historical Match Enrichment

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pilot-historical-match-enrichment:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          python -m playwright install --with-deps chromium

      - name: Run historical enrichment pilot
        env:
          HISTORICAL_ENRICHMENT_PILOT_LIMIT: "30"
          HISTORICAL_ENRICHMENT_MAX_SOURCE_URLS: "12"
          HISTORICAL_ENRICHMENT_TARGET_PLAYERS: "Rehberg,Carballes Baena"
          HISTORICAL_ENRICHMENT_WAIT_MS: "5000"
          HISTORICAL_ENRICHMENT_ROW_CLICK_WAIT_MS: "3000"
        run: |
          python -m tennis_elo.pilot_historical_match_enrichment

      - name: Validate pilot
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path(
              "data/enrichment/"
              "historical_match_metadata_pilot.json"
          )

          if not path.exists():
              raise SystemExit(
                  "Missing historical enrichment pilot output"
              )

          data = json.loads(
              path.read_text(encoding="utf-8")
          )

          print("SUMMARY:", data.get("summary", {}))

          for row in data.get("results", []):
              print({
                  "status": row.get("status"),
                  "date": row.get("date"),
                  "match": (
                      f"{row.get('player_1')} - "
                      f"{row.get('player_2')}"
                  ),
                  "tour_level": row.get("tour_level"),
                  "tournament_name": row.get(
                      "tournament_name"
                  ),
                  "detail_url": row.get("detail_url"),
                  "error": row.get("error"),
              })
          PY

      - name: Commit pilot outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/enrichment/historical_match_metadata_pilot.json
          git add data/reports/historical_match_metadata_pilot_report.json
          git add data/reports/historical_match_metadata_debug || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Pilot historical match metadata enrichment"
          git pull --rebase --autostash origin main
          git push origin HEAD:main
