name: Build Match Winner ELO Shadow Picks

on:
  workflow_dispatch:
  schedule:
    - cron: "50 */3 * * *"

permissions:
  contents: write

concurrency:
  group: match-winner-elo-shadow
  cancel-in-progress: true

jobs:
  build-match-winner-elo-shadow:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build match-winner shadow picks
        env:
          TENNIS_ODDS_URL: "https://raw.githubusercontent.com/jakobm121/Ai/refs/heads/main/data/tennis_odds_today.json"
          MATCH_WINNER_MIN_PLAYER_MATCHES: "10"
          MATCH_WINNER_MIN_MODEL_PROBABILITY: "0.55"
          MATCH_WINNER_MIN_PROBABILITY_EDGE: "0.03"
          MATCH_WINNER_MIN_EV: "0.05"
          MATCH_WINNER_MIN_ODDS: "1.50"
          MATCH_WINNER_MAX_ODDS: "5.00"
          MATCH_WINNER_OVERALL_WEIGHT: "0.60"
          MATCH_WINNER_SURFACE_WEIGHT: "0.40"
          MATCH_WINNER_SURFACE_CONFIDENCE_MATCHES: "20"
        run: python -m tennis_elo.build_match_winner_elo_shadow

      - name: Validate shadow picks
        run: |
          python - <<'PY'
          import json
          from collections import Counter
          from pathlib import Path

          path = Path(
              "data/predictions/match_winner_elo_shadow.json"
          )

          if not path.exists():
              raise SystemExit(
                  "Missing match-winner shadow output"
              )

          data = json.loads(
              path.read_text(encoding="utf-8")
          )

          print("SUMMARY:", data.get("summary", {}))

          for pick in data.get("shadow_picks", [])[:30]:
              print(
                  "PICK:",
                  pick.get("match"),
                  "pick=", pick.get("pick_player"),
                  "odds=", pick.get("odds"),
                  "model=", pick.get("model_probability"),
                  "book=", pick.get("bookmaker_probability"),
                  "edge=", pick.get("probability_edge"),
                  "ev=", pick.get("ev"),
                  "confidence=", pick.get("confidence"),
              )

          reasons = Counter()

          for row in data.get("all_evaluated", []):
              for reason in row.get("reasons", []):
                  reasons[reason] += 1

          print("NO-BET REASONS:", dict(reasons))
          PY

      - name: Commit shadow outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/predictions/match_winner_elo_shadow.json
          git add data/reports/match_winner_elo_shadow_report.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update match winner ELO shadow picks"
          git pull --rebase --autostash origin main
          git push origin HEAD:main
