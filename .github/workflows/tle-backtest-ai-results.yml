name: TLE Backtest AI Results

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tle-backtest-ai-results:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Tennis-ELO repository
        uses: actions/checkout@v4

      - name: Run TLE backtest on AI tennis result JSONs
        run: |
          python -m tennis_elo.tle_backtest_ai_results \
            --ai-json "https://raw.githubusercontent.com/jakobm121/Ai/refs/heads/main/data/tennis_value_results.json,https://raw.githubusercontent.com/jakobm121/Ai/refs/heads/main/data/tennis_totals_results.json" \
            --min-edge 0.03 \
            --min-ev 0.0

      - name: Show TLE AI-results backtest summary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("data/tle/reports/tle_backtest_ai_results_report.json")

          if not path.exists():
              raise SystemExit(f"Missing report: {path}")

          payload = json.loads(path.read_text(encoding="utf-8"))

          print(json.dumps(
              payload.get("summary", {}),
              indent=2,
              ensure_ascii=False,
          ))

          print("\nKEY GROUPS")
          print(json.dumps(
              payload.get("key_groups", {}),
              indent=2,
              ensure_ascii=False,
          ))
          PY

      - name: Commit TLE AI-results backtest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            data/tle/backtests/tle_backtest_ai_results.json \
            data/tle/reports/tle_backtest_ai_results_report.json \
            data/tle/backtests/tle_backtest_ai_results_by_group.csv

          if git diff --cached --quiet; then
            echo "No TLE AI-results backtest changes to commit."
            exit 0
          fi

          git commit -m "Backtest AI tennis results with TLE Elo"
          git push
