name: TLE Backtest API Overlay With Odds

on:
  workflow_dispatch:
    inputs:
      odds_url:
        description: "Odds backfill JSON URL"
        required: true
        default: "https://raw.githubusercontent.com/jakobm121/Ai/refs/heads/main/data/tle/odds_backfill/tle_odds_backfill.json"

      fallback:
        description: "Odds fallback"
        required: true
        default: "clean_average"
        type: choice
        options:
          - clean_average
          - clean_median
          - bookmaker
          - median
          - best

      bookmaker:
        description: "Preferred bookmaker"
        required: true
        default: "Pncl"

      min_odds:
        description: "Minimum allowed individual odds"
        required: true
        default: "1.20"

      max_odds:
        description: "Maximum allowed individual odds"
        required: true
        default: "8.00"

      min_overround:
        description: "Minimum allowed pair overround"
        required: true
        default: "-0.03"

      max_overround:
        description: "Maximum allowed pair overround"
        required: true
        default: "0.18"

      min_edge:
        description: "Minimum TLE edge"
        required: true
        default: "0.03"

      min_ev:
        description: "Minimum TLE EV"
        required: true
        default: "0.00"

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Tennis-ELO
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run TLE odds backtest
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m tennis_elo.tle_backtest_api_overlay_with_odds \
            --odds "${{ inputs.odds_url }}" \
            --fallback "${{ inputs.fallback }}" \
            --bookmaker "${{ inputs.bookmaker }}" \
            --min-odds "${{ inputs.min_odds }}" \
            --max-odds "${{ inputs.max_odds }}" \
            --min-overround "${{ inputs.min_overround }}" \
            --max-overround "${{ inputs.max_overround }}" \
            --min-edge "${{ inputs.min_edge }}" \
            --min-ev "${{ inputs.min_ev }}"

      - name: Show report
        run: |
          echo "=== JSON REPORT ==="
          cat data/tle/reports/tle_api_overlay_odds_backtest_report.json || true

          echo ""
          echo "=== MARKDOWN REPORT ==="
          cat data/tle/backtests/tle_api_overlay_odds_backtest.md || true

      - name: Commit backtest outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/tle/backtests data/tle/reports

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Run TLE odds backtest"
          git push
