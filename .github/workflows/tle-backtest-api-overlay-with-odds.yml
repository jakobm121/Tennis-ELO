name: TLE Backtest API Overlay With Odds

on:
  workflow_dispatch:
    inputs:
      bookmaker:
        description: "Preferred bookmaker key from API odds"
        required: true
        default: "Pncl"

      fallback:
        description: "Fallback if bookmaker is missing: none, median, max, min"
        required: true
        default: "median"

      min_edge:
        description: "Minimum devig edge for value bets"
        required: true
        default: "0.03"

      min_ev:
        description: "Minimum EV for value bets"
        required: true
        default: "0.0"

permissions:
  contents: write

jobs:
  backtest-api-overlay-with-odds:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Tennis-ELO repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run API overlay odds backtest
        run: |
          python -m tennis_elo.tle_backtest_api_overlay_with_odds \
            --bookmaker "${{ inputs.bookmaker }}" \
            --fallback "${{ inputs.fallback }}" \
            --min-edge "${{ inputs.min_edge }}" \
            --min-ev "${{ inputs.min_ev }}"

      - name: Show odds backtest summary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path(
              "data/tle/reports/tle_api_overlay_odds_backtest_report.json"
          )

          if not path.exists():
              raise SystemExit(f"Missing report: {path}")

          payload = json.loads(path.read_text(encoding="utf-8"))

          print(json.dumps(
              payload.get("summary", {}),
              indent=2,
              ensure_ascii=False,
          ))
          PY

      - name: Commit API overlay odds backtest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            data/tle/backtests/tle_api_overlay_odds_backtest.json \
            data/tle/reports/tle_api_overlay_odds_backtest_report.json

          if git diff --cached --quiet; then
            echo "No API overlay odds backtest changes to commit."
            exit 0
          fi

          git commit -m "Backtest TLE API overlay with odds"
          git push
