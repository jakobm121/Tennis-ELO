name: Flashscore History Parser

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  flashscore-history:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium

      - name: Run Flashscore history parser
        run: python -m tennis_elo.sources.flashscore_history_parser

      - name: Commit parsed history data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data || true
          git commit -m "Update Flashscore history data" || echo "No changes to commit"
          git push
