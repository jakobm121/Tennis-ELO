name: TLE Enrich API Results

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  enrich-api-results:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Tennis-ELO repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Enrich API results with tournament metadata
        run: |
          python -m tennis_elo.tle_enrich_api_results

      - name: Show enrichment summary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path(
              "data/tle/source/api/tle_api_results_backfill_enriched.json"
          )

          if not path.exists():
              raise SystemExit(f"Missing output: {path}")

          payload = json.loads(path.read_text(encoding="utf-8"))

          print(json.dumps(
              payload.get("summary", {}),
              indent=2,
              ensure_ascii=False,
          ))
          PY

      - name: Commit enriched API results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            data/tle/source/api/tle_api_results_backfill_enriched.json \
            data/tle/reports/tle_enrich_api_results_report.json

          if git diff --cached --quiet; then
            echo "No enriched API result changes to commit."
            exit 0
          fi

          git commit -m "Enrich TLE API results"
          git push
