name: TLE Import Sackmann History

on:
  workflow_dispatch:
    inputs:
      start_year:
        description: First Sackmann season to import
        required: false
        default: "2023"
      end_year:
        description: Last Sackmann season to import
        required: false
        default: "2026"

permissions:
  contents: write

concurrency:
  group: tle-import-sackmann
  cancel-in-progress: true

jobs:
  tle-import-sackmann:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Remove obsolete large TLE file
        run: |
          rm -f data/tle/processed/tle_sackmann_matches.json
          rm -f data/tle/reports/tle_import_sackmann_report.json

      - name: Import Sackmann history for TLE
        env:
          TLE_START_YEAR: ${{ github.event.inputs.start_year || '2023' }}
          TLE_END_YEAR: ${{ github.event.inputs.end_year || '2026' }}
          TLE_HTTP_TIMEOUT: "90"
        run: |
          python -m tennis_elo.tle_import_sackmann

      - name: Validate TLE import
        run: |
          python - <<'PY'
          import gzip
          import json
          from pathlib import Path

          base_dir = Path(
              "data/tle/processed/sackmann"
          )
          manifest_path = (
              base_dir
              / "tle_sackmann_manifest.json"
          )
          report_path = Path(
              "data/tle/reports/"
              "tle_import_sackmann_report.json"
          )

          for path in (
              manifest_path,
              report_path,
          ):
              if not path.exists():
                  raise SystemExit(
                      f"Missing generated file: {path}"
                  )

          manifest = json.loads(
              manifest_path.read_text(
                  encoding="utf-8"
              )
          )
          report = json.loads(
              report_path.read_text(
                  encoding="utf-8"
              )
          )

          print(
              "SUMMARY:",
              report.get("summary", {}),
          )

          year_files = manifest.get(
              "year_files",
              [],
          )

          if not year_files:
              raise SystemExit(
                  "Manifest contains no year files"
              )

          print("\nYEAR FILES:")

          total_rows = 0

          for item in year_files:
              path = Path(item["path"])

              if not path.exists():
                  raise SystemExit(
                      f"Missing year file: {path}"
                  )

              size_mb = (
                  path.stat().st_size
                  / 1024
                  / 1024
              )

              if size_mb >= 100:
                  raise SystemExit(
                      f"File exceeds GitHub limit: "
                      f"{path} ({size_mb:.2f} MB)"
                  )

              rows = 0

              with gzip.open(
                  path,
                  "rt",
                  encoding="utf-8",
              ) as handle:
                  for line in handle:
                      if line.strip():
                          rows += 1

              total_rows += rows

              print({
                  "year": item.get("year"),
                  "path": str(path),
                  "rows": rows,
                  "size_mb": round(size_mb, 2),
              })

          expected = int(
              report.get(
                  "summary",
                  {},
              ).get(
                  "matches_total",
                  0,
              )
          )

          if total_rows != expected:
              raise SystemExit(
                  f"Row count mismatch: "
                  f"{total_rows} != {expected}"
              )
          PY

      - name: Commit TLE outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A data/tle/processed
          git add data/tle/reports/tle_import_sackmann_report.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update TLE Sackmann history"
          git pull --rebase --autostash origin main
          git push origin HEAD:main
